version: 3.8
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pethome
      POSTGRES_USER: pethome
      POSTGRES_PASSWORD: 
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - rd_data:/data
  backend:
    build: .
    ports:
      - 3000:3000
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      JWT_SECRET: 
      ALIPAY_ACCOUNT: hezhong_z@aliyun.com
      WECHAT_ID: MoreRoadSafety
    depends_on:
      - postgres
      - redis
volumes:
  pg_data:
  rd_data:
